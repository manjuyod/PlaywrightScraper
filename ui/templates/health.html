<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Health Check</title>
        <link
            rel="icon"
            type="image/webp"
            href="{{ url_for('static', filename='imgs/tc_logo.webp') }}"
        />
        {% include "_react_assets.html" %}
    </head>
    <body>
        {% set messages = get_flashed_messages() %}
        <div id="tc-react-root"></div>
        <script id="tc-page-data" type="application/json">
            {
                "page": "health",
                "csrfToken": {{ csrf_token|tojson }},
                "logoutUrl": {{ url_for('logout')|tojson }},
                "logoUrl": {{ url_for('static', filename='imgs/tc_logo.webp')|tojson }},
                "messages": {{ messages|tojson }},
                "countAll": {{ count_all|tojson }},
                "countSynced": {{ count_synced|tojson }},
                "countBadLogins": {{ count_bad_logins|tojson }},
                "jobs": [
                    {% for job_id, job in jobs.items() %}
                    {
                        "id": {{ job_id|tojson }},
                        "total": {{ job.total|default(0)|tojson }},
                        "step": {{ job.step|default(0)|tojson }},
                        "steps": {{ job.steps|default(0)|tojson }},
                        "pct": {{ job.pct|default(0)|tojson }}
                    }{% if not loop.last %},{% endif %}
                    {% endfor %}
                ],
                "health": [
                    {% for franchise in health %}
                    {
                        "id": {{ franchise.id|tojson }},
                        "url": {{ url_for('franchise_view', franchise_id=franchise.id)|tojson }},
                        "synced": {{ franchise.synced|default(0)|tojson }},
                        "total": {{ franchise.total|default(0)|tojson }},
                        "errorCount": {{ franchise.error_count|default(0)|tojson }},
                        "errorGroups": {{ franchise.error_groups|default([])|tojson }},
                        "malformedInputs": {{ franchise.malformed_inputs|default(0)|tojson }},
                        "nonconfiguredPortals": {{ franchise.nonconfigured_portals|default(0)|tojson }},
                        "lastUpdated": {{ franchise.last_updated|default('n/a')|tojson }},
                        "badLogins": {{ franchise.bad_logins|default(0)|tojson }}
                    }{% if not loop.last %},{% endif %}
                    {% endfor %}
                ]
            }
        </script>
    </body>
</html>
