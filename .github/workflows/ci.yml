name: clean-checkout-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest -q
      - run: uv run python scripts/check_python_boundaries.py
      - run: uv export --frozen --no-emit-project --format requirements-txt --output-file "$RUNNER_TEMP/requirements.txt"
      - run: uv run pip-audit --requirement "$RUNNER_TEMP/requirements.txt"

  rust:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-targets
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high

  migrations:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Fresh 001-007 migration
        run: |
          createdb fresh
          for migration in api/migrations/00{1..7}_*.sql; do
            psql --set ON_ERROR_STOP=1 --dbname fresh --file "$migration"
          done
      - name: Upgrade 001-003 to 004-007
        run: |
          createdb upgrade
          for migration in api/migrations/00{1..3}_*.sql; do
            psql --set ON_ERROR_STOP=1 --dbname upgrade --file "$migration"
          done
          for migration in api/migrations/00{4..7}_*.sql; do
            psql --set ON_ERROR_STOP=1 --dbname upgrade --file "$migration"
          done

  security-and-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: sh deploy/bin/build-release-artifacts ci "$RUNNER_TEMP/releases"
      - run: sha256sum --check api-ci.tar.gz.sha256
        working-directory: ${{ runner.temp }}/releases
      - run: sha256sum --check frontend-ci.tar.gz.sha256
        working-directory: ${{ runner.temp }}/releases
      - name: Verify role artifact separation
        run: |
          tar -tzf "$RUNNER_TEMP/releases/frontend-ci.tar.gz" | grep -q '^./ui/'
          ! tar -tzf "$RUNNER_TEMP/releases/frontend-ci.tar.gz" | grep -Eq 'api$|migrations|backfill'
          tar -tzf "$RUNNER_TEMP/releases/api-ci.tar.gz" | grep -q '^./api$'
          ! tar -tzf "$RUNNER_TEMP/releases/api-ci.tar.gz" | grep -Eq 'ui/|\.venv|SESSION_SECRET'
