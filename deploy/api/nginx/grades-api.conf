limit_req_zone $binary_remote_addr zone=grade_api_per_ip:10m rate=600r/m;

log_format grade_api_safe '$remote_addr [$time_local] "$request_method $uri $server_protocol" '
                          '$status $body_bytes_sent rt=$request_time request_id=$request_id';

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name grades-api.tutoringclub.com grades-api-dev.tutoringclub.com;

    ssl_certificate /etc/grade-api/pki/api-server-chain.crt;
    ssl_certificate_key /etc/grade-api/pki/api-server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/grade-api-access.log grade_api_safe;
    error_log /var/log/nginx/grade-api-error.log warn;

    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 30s;
    limit_req zone=grade_api_per_ip burst=100 nodelay;
    limit_req_status 429;

    location / {
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:3000;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        proxy_hide_header Server;
    }
}
