map $ssl_client_s_dn $mtls_role {
    default "";
    ~(^|,)OU=frontend(,|$) frontend;
    ~(^|,)OU=worker(,|$) worker;
    ~(^|,)OU=scheduler(,|$) scheduler;
    ~(^|,)OU=operator(,|$) operator;
}

map "$mtls_role:$uri" $mtls_route_allowed {
    default 0;
    ~^frontend:/livez$ 1;
    ~^frontend:/readyz$ 1;
    ~^frontend:/api/(auth|dashboard|students|jobs|results)(/|$) 1;
    ~^worker:/livez$ 1;
    ~^worker:/api/worker/ 1;
    ~^scheduler:/livez$ 1;
    ~^scheduler:/readyz$ 1;
    ~^scheduler:/api/scheduler/ 1;
    ~^operator:/livez$ 1;
    ~^operator:/readyz$ 1;
    ~^operator:/api/operator/ 1;
}

log_format grade_api_mtls '$remote_addr [$time_local] "$request_method $uri $server_protocol" '
                          '$status $body_bytes_sent rt=$request_time '
                          'mtls_subject="$ssl_client_s_dn" mtls_serial="$ssl_client_serial"';

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name grades-api.tutoringclub.com;

    ssl_certificate /etc/grade-api/pki/api-server-chain.crt;
    ssl_certificate_key /etc/grade-api/pki/api-server.key;
    ssl_client_certificate /etc/grade-api/pki/client-ca-chain.pem;
    ssl_crl /etc/grade-api/pki/client-ca.crl.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/grade-api-access.log grade_api_mtls;
    error_log /var/log/nginx/grade-api-error.log warn;

    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 30s;

    if ($mtls_route_allowed = 0) {
        return 403;
    }

    location / {
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:3000;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Connection "";
        proxy_hide_header Server;
    }
}
