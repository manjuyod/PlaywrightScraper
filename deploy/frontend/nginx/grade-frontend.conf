log_format grade_frontend_safe '$remote_addr [$time_local] "$request_method $uri $server_protocol" '
                               '$status $body_bytes_sent rt=$request_time';

include /etc/nginx/conf.d/cloudflare-real-ip.conf;

map $request_method $login_limit_key {
    default "";
    POST $binary_remote_addr;
}

limit_req_zone $login_limit_key zone=login_per_ip:10m rate=30r/m;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name grades.tutoringclub.com;

    ssl_certificate /etc/grade-frontend/pki/cloudflare-origin.crt;
    ssl_certificate_key /etc/grade-frontend/pki/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;

    access_log /var/log/nginx/grade-frontend-access.log grade_frontend_safe;
    error_log /var/log/nginx/grade-frontend-error.log warn;
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    limit_req_status 429;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /login {
        limit_req zone=login_per_ip burst=10 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8080;
        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Connection "";
        proxy_hide_header Server;
    }

    location / {
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8080;
        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Connection "";
        proxy_hide_header Server;
    }
}
